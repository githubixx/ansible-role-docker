---
- name: Load common variables
  ansible.builtin.include_vars:
    file: "main.yml"
  tags:
    - docker

- name: Load required variables based on the OS type
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_version'] }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_release'] }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}.yml"
  tags:
    - always

- name: Bootstrap python3-apt on Debian family hosts
  when:
    - ansible_facts['os_family'] == "Debian"
  ansible.builtin.raw: |
    if python3 -c 'import apt' >/dev/null 2>&1; then
      echo "python3-apt already present"
    else
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y python3-apt
    fi
  register: docker__python3_apt_bootstrap
  changed_when: "'python3-apt already present' not in docker__python3_apt_bootstrap.stdout"

- name: Gather the package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Register if iptables/nftables is installed
  when:
    - "docker__ip_nft_tables_package.value in ansible_facts.packages"
  ansible.builtin.set_fact:
    docker__ip_nft_tables_installed: true
  loop: "{{ docker_ip_nft_tables_packages | dict2items }}"
  loop_control:
    loop_var: docker__ip_nft_tables_package

- name: Print if iptables/nftables is installed
  when:
    - docker__ip_nft_tables_installed is defined
    - docker__ip_nft_tables_installed
  ansible.builtin.debug:
    msg: "Either iptables or nftables is installed"

- name: Install required iptables packages
  when:
    - docker__ip_nft_tables_installed is not defined
    - docker_firewall_flavor == "iptables"
  ansible.builtin.package:
    name: "{{ docker_ip_nft_tables_packages.iptables }}"
    state: present

- name: Install required nftables packages
  when:
    - docker__ip_nft_tables_installed is not defined
    - docker_firewall_flavor == "nftables"
  ansible.builtin.package:
    name: "{{ docker_ip_nft_tables_packages.nftables }}"
    state: present

- name: Persist Docker kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/docker.conf
    content: |
      {% for docker__kernel_module in docker_kernel_modules %}
      {{ docker__kernel_module }}
      {% endfor %}
    owner: root
    group: root
    mode: "0644"
  tags:
    - docker

- name: Load Docker kernel modules
  ansible.builtin.command:
    cmd: "modprobe {{ docker__kernel_module }}"
  loop: "{{ docker_kernel_modules }}"
  loop_control:
    loop_var: docker__kernel_module
  changed_when: false
  tags:
    - docker

- name: Copy certificates for Docker registries (if provided)
  ansible.builtin.copy:
    src: "{{ docker_ca_certificates_src_dir }}/{{ item }}"
    dest: "{{ docker_ca_certificates_dst_dir }}/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  with_items:
    - "{{ docker_ca_certificates }}"
  when: docker_ca_certificates is defined
  tags:
    - docker
    - docker-certificates

- name: Update CA certificates
  ansible.builtin.command: "update-ca-certificates"
  register: docker__update_ca_certificates
  changed_when: "'0 added, 0 removed; done.' not in docker__update_ca_certificates.stdout"
  when: docker_ca_certificates is defined
  tags:
    - docker
    - docker-certificates

- name: Create docker group
  ansible.builtin.group:
    name: "{{ docker_group }}"
    gid: "{{ docker_gid }}"
    state: present
  tags:
    - docker

- name: Create docker user
  ansible.builtin.user:
    name: "{{ docker_user }}"
    uid: "{{ docker_uid }}"
    group: "{{ docker_group }}"
    shell: /usr/sbin/nologin
  tags:
    - docker

- name: Create download directory (used to store archives)
  ansible.builtin.file:
    path: "{{ docker_download_dir }}"
    state: directory
    mode: "0750"
  tags:
    - docker

- name: Register docker binary is installed
  ansible.builtin.stat:
    path: "{{ docker_bin_dir }}/docker"
  register: docker_bin_stat
  tags:
    - docker

- name: Register installed Docker CLI version
  when: docker_bin_stat.stat.exists
  ansible.builtin.command:
    cmd: "{{ docker_bin_dir }}/docker --version"
  register: docker__docker_cli_version
  changed_when: false
  tags:
    - docker

- name: Register if Docker binaries need installation
  ansible.builtin.set_fact:
    docker__install_binaries: >-
      {{
        (not docker_bin_stat.stat.exists)
        or (upgrade_docker | default(false) | bool)
        or (
          (
            docker__docker_cli_version.stdout
            | default('')
            | regex_findall('[0-9]+\.[0-9]+\.[0-9]+')
            | first
            | default('')
          ) != docker_version
        )
      }}
  tags:
    - docker

- name: Downloading official Docker binaries archive
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/static/stable/{{ ansible_facts['architecture'] }}/docker-{{ docker_version }}.tgz"
    dest: "{{ docker_download_dir }}/docker-{{ docker_version }}.tgz"
    mode: "0640"
  when: docker__install_binaries
  tags:
    - docker

- name: Unzip downloaded Docker archive
  ansible.builtin.unarchive:
    src: "{{ docker_download_dir }}/docker-{{ docker_version }}.tgz"
    dest: "{{ docker_download_dir }}"
    remote_src: true
  when: docker__install_binaries
  tags:
    - docker

- name: Copy Docker binaries to destination directory
  ansible.builtin.copy:
    src: "{{ docker_download_dir }}/docker/{{ binary }}"
    dest: "{{ docker_bin_dir }}/{{ binary }}"
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  notify:
    - Restart docker
  loop: "{{ docker_binaries }}"
  loop_control:
    loop_var: "binary"
  when: docker__install_binaries
  tags:
    - docker

- name: Combine dockerd_settings and dockerd_settings_user (if defined)
  ansible.builtin.set_fact:
    dockerd_settings: "{{ dockerd_settings | combine(dockerd_settings_user | default({})) }}"
  tags:
    - docker

- name: Create docker.socket systemd file
  ansible.builtin.template:
    src: etc/systemd/system/docker.socket.j2
    dest: /etc/systemd/system/docker.socket
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart docker
  tags:
    - docker

- name: Create docker.service systemd file
  ansible.builtin.template:
    src: etc/systemd/system/docker.service.j2
    dest: /etc/systemd/system/docker.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart docker
  tags:
    - docker

- name: Install docker-compose binary
  when:
    - docker_compose_type is defined
  ansible.builtin.include_tasks:
    file: "tasks/docker-compose.yml"
    apply:
      tags:
        - docker-compose
  tags:
    - docker-compose

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  tags:
    - docker
